<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilates para Tatis</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-coral: #f7a099;
            --soft-pink: #fdf2f1;
            --soft-bg: #f5f3f0;
            --text-dark: #555;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--soft-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-header { text-align: center; margin-bottom: 25px; }
        .main-header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #d88a83;
            margin: 0;
        }
        .main-header span { font-size: 1rem; color: #b0b0b0; letter-spacing: 4px; text-transform: uppercase; }

        .container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border-radius: 25px;
            overflow: hidden;
            flex-direction: row;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; border-radius: 25px; }
            .main-header h1 { font-size: 2.8rem; }
            .details-panel { padding: 40px 25px !important; text-align: center; }
            .calendar-panel { padding: 25px !important; }
        }

        .details-panel {
            flex: 1;
            background-color: var(--primary-coral);
            color: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 300px;
        }

        .details-panel h2 { margin: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.9; }
        .details-panel h1 { font-size: 2.3rem; margin: 15px 0; line-height: 1.2; font-weight: bold; }
        
        .play-button {
            display: inline-block;
            background: white;
            color: var(--primary-coral);
            padding: 18px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .calendar-panel { flex: 1.2; padding: 40px; color: var(--text-dark); background: white; }
        .month-name { font-weight: bold; font-size: 1.4rem; color: #d88a83; text-align: center; margin-bottom: 25px; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .day-name { font-size: 0.75rem; font-weight: bold; color: #ccc; padding-bottom: 15px; }

        .day {
            padding: 15px 0;
            font-size: 1.05rem;
            cursor: pointer;
            border-radius: 18px;
            transition: 0.2s;
            position: relative;
        }

        .day:hover { background: var(--soft-pink); color: var(--primary-coral); }
        .day.active { background: var(--primary-coral) !important; color: white !important; font-weight: bold; }

        .dot { width: 5px; height: 5px; background: var(--primary-coral); border-radius: 50%; margin: 4px auto 0; }
        .day.active .dot { background: white; }
    </style>
</head>
<body>

    <div class="main-header">
        <span>Glow Up Planner</span>
        <h1>Pilates para Tatis</h1>
    </div>

    <div class="container">
        <div class="details-panel" id="detailsPanel">
            <h2 id="displayDate">HOLA LINDA</h2>
            <h1 id="workoutTitle">Escoge un día para empezar</h1>
            <p id="descText" style="font-size: 1.1rem; opacity: 0.95; margin-bottom: 20px; line-height: 1.5;"></p>
            <a href="#" id="playBtn" class="play-button" target="_blank" style="display:none;">▶ REPRODUCIR CLASE</a>
        </div>

        <div class="calendar-panel">
            <div class="month-name">MAYO 2026</div>
            <div class="grid" id="calendarGrid">
                <div class="day-name">LU</div><div class="day-name">MA</div><div class="day-name">MI</div>
                <div class="day-name">JU</div><div class="day-name">VI</div><div class="day-name">SA</div><div class="day-name">DO</div>
            </div>
        </div>
    </div>

<script>
    const workouts = [
        { d: 27, m: 'ABR', t: 'Full Body Pilates', v: 'iDB5P9G-gbs', desc: 'Empezamos con energía y control.' },

        { d: 4, m: 'MAY', t: 'Reto Día 1', v: '354ezj2UHdM', desc: 'Subimos la intensidad. ¡Tú puedes!' },
        { d: 5, m: 'MAY', t: 'Hourglass', v: 'FuTiqNBj_vc', desc: 'Enfoque total en zona media.' },
        { d: 6, m: 'MAY', t: 'Descanso Activo', v: '', desc: 'Paseo al aire libre o movilidad de hombros y espalda.' },
        { d: 7, m: 'MAY', t: 'Reto Día 1', v: '354ezj2UHdM', desc: 'Repetimos para dominar los movimientos.' },
        { d: 8, m: 'MAY', t: 'Full Body', v: 'Q88LLYMkaT4', desc: 'Siéntete fuerte y activa.' },
        { d: 9, m: 'MAY', t: 'Hourglass', v: 'ct5l12rRHm8', desc: 'Definición rápida antes del descanso.' },
        { d: 10, m: 'MAY', t: 'Descanso Total', v: '', desc: 'Pausa necesaria para que el músculo crezca.' },

        { d: 18, m: 'MAY', t: 'Reto Día 1', v: '354ezj2UHdM', desc: 'Iniciamos la recta final.' },
        { d: 19, m: 'MAY', t: 'Full Body', v: 'iDB5P9G-gbs', desc: 'Cuerpo tonificado y mente clara.' },
        { d: 20, m: 'MAY', t: 'Descanso Activo', v: '', desc: 'Camina 20 minutos o haz movilidad articular.' },

        { d: 22, m: 'MAY', t: 'Doble Hourglass', v: 'ct5l12rRHm8', desc: 'Especial para cintura de avispa.' },
        { d: 23, m: 'MAY', t: 'Full Body', v: 'Q88LLYMkaT4', desc: 'Último entrenamiento intenso.' },
        { d: 24, m: 'MAY', t: 'Descanso Total', v: '', desc: '¡Lo lograste! Celebra tu constancia.' },
        { d: 25, m: 'MAY', t: 'Repite Favorito', v: '354ezj2UHdM', desc: 'Día extra para las más motivadas.' },
        { d: 26, m: 'MAY', t: 'Full Body', v: 'Q88LLYMkaT4', desc: 'Mantenimiento ligero.' },
        { d: 27, m: 'MAY', t: 'Descanso Activo', v: '', desc: 'Día de relax y estiramiento.' },
        { d: 28, m: 'MAY', t: 'Full Body', v: 'iDB5P9G-gbs', desc: 'Fuerza y control mental.' },
        { d: 29, m: 'MAY', t: 'Hourglass', v: 'FuTiqNBj_vc', desc: 'Esculpiendo el cuerpo.' },
        { d: 30, m: 'MAY', t: 'Full Body', v: 'Q88LLYMkaT4', desc: 'Finalizando el mes con todo.' },
        { d: 31, m: 'MAY', t: '¡Bravo Tatis!', v: '', desc: 'Orgullosa de tu proceso este mes. ✨' }
    ];

    const grid = document.getElementById('calendarGrid');

    workouts.forEach(work => {
        const div = document.createElement('div');
        div.className = 'day';
        div.innerHTML = `${work.d}${work.v ? '<div class="dot"></div>' : ''}`;
        div.onclick = function() {
            document.querySelectorAll('.day').forEach(d => d.classList.remove('active'));
            div.classList.add('active');
            document.getElementById('displayDate').innerText = `${work.d} ${work.m}`;
            document.getElementById('workoutTitle').innerText = work.t;
            document.getElementById('descText').innerText = work.desc;
            
            const btn = document.getElementById('playBtn');
            if(work.v) {
                btn.style.display = 'inline-block';
                btn.href = "https://www.youtube.com/watch?v=" + work.v;
            } else {
                btn.style.display = 'none';
            }
            if(window.innerWidth < 768) {
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        };
        grid.appendChild(div);
    });
</script>
</body>
</html>
